<div class="container">
  <form (ngSubmit)="onSubmit()">
    <mat-card class="shipping-card">
      <mat-card-header>
        <mat-card-title>Update Profile Information</mat-card-title>
      </mat-card-header>
      <mat-card-content style="padding: 20px">
        <div class="row">
          <div class="col">
            <mat-form-field class="full-width" appearance="outline">
              <input matInput placeholder="First name" [formField]="profileForm.name" />
              @for (error of profileForm.name().errors(); track error) {
                <mat-error>{{ error.message }}</mat-error>
              }
            </mat-form-field>
          </div>
          <div class="col">
            <mat-form-field class="full-width" appearance="outline">
              <input matInput placeholder="Last name" [formField]="profileForm.surname" />
              @for (error of profileForm.surname().errors(); track error) {
                <mat-error>{{ error.message }}</mat-error>
              }
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <mat-form-field class="full-width" appearance="outline">
              <input matInput placeholder="Username" [formField]="profileForm.username" />
              @for (error of profileForm.username().errors(); track error) {
                <mat-error>{{ error.message }}</mat-error>
              }
            </mat-form-field>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button matButton="filled" type="button" (click)="openUpdatePassword()">
          Update Password
        </button>
        <button matButton="filled" type="button" (click)="openDeactivateAccount()">
          Deactivate Account
        </button>
        <button matButton="elevated" color="primary" type="submit">Update</button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
