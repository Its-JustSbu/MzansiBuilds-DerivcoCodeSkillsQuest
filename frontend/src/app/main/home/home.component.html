<div class="grid-container">
  <h1 class="mat-h1">All Projects</h1>
  <mat-grid-list cols="{{cols}}" rowHeight="200px">
    @for (card of cards(); track card) {
      <mat-grid-tile>
        <app-project-card [isGeneralCard]="true" [card]="card" />
      </mat-grid-tile>
    }
  </mat-grid-list>
</div>
