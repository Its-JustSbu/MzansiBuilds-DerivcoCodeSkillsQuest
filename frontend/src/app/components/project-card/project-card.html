<mat-card class="dashboard-card">
  <mat-card-header>
    <mat-card-title>
      {{ card.name }}
      <button matIconButton class="more-button" [matMenuTriggerFor]="menu" aria-label="Toggle menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu" xPosition="before">
        <button mat-menu-item (click)="openDetails()">View</button>
        @if (!isGeneralCard) {
          <button mat-menu-item (click)="markAsComplete()">Mark as Complete</button>
          <button mat-menu-item (click)="openEdit()">Edit</button>
          <button mat-menu-item (click)="openDelete()">Delete</button>
          <button mat-menu-item (click)="openMilestones()">Milestones</button>
        } @else {
          <button mat-menu-item (click)="openRequestModal()">Request Access</button>
        }
      </mat-menu>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content class="dashboard-card-content" (click)="openDetails()">
    <div>{{ card.description }}</div>
  </mat-card-content>
</mat-card>
