<mat-card class="dashboard-card">
  <mat-card-header>
    <mat-card-title>
      {{ card.name }}
      <button matIconButton class="more-button" [matMenuTriggerFor]="menu" aria-label="Toggle menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu" xPosition="before">
        <button mat-menu-item (click)="openDetails()">View</button>
        @if (!isGeneralCard) {
          <button mat-menu-item (click)="openMilestones()">Update Progress</button>
          <button mat-menu-item (click)="openEdit()">Edit</button>
          <button mat-menu-item (click)="openDelete()">Delete</button>
        } @else {
          <button mat-menu-item (click)="openRequestModal()">Request Access</button>
        }
      </mat-menu>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content class="dashboard-card-content" (click)="openDetails()">
    <div>{{ card.description }}</div>
  </mat-card-content>
  <mat-card-footer>
    <div class="card-footer">
      @if ((card.collaborations && card.collaborations.length > 0) || (collaborations && collaborations.length > 0)) {
        <div class="status-indicator">
          <div class="pulse-wrap">
            <div class="pulse-ring"></div>
            <div class="dot-core"></div>
          </div>
          <span class="status-label">Active</span>
        </div>
      } @else {
        <div class="status-indicator">
          <div class="pulse-wrap">
            <div class="pulse-ring-error"></div>
            <div class="dot-core-error"></div>
          </div>
          <span class="status-label">Inactive</span>
        </div>
      }
      <span class="status-meta">Created: {{ card.createdAt | date: 'short' }}</span>
    </div>
  </mat-card-footer>
</mat-card>
