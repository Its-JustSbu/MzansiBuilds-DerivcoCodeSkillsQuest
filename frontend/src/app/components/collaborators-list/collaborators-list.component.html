<div class="mat-elevation-z2">
  <table mat-table [dataSource]="collaborators()" class="mat-elevation-z8">
    <!-- Dynamic Column Definition -->
    @for (column of collaboratorsColumn(); track $index) {
      <ng-container matColumnDef="{{ column }}">
        <th mat-header-cell *matHeaderCellDef style="background: transparent">
          {{ column }}
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element[column] }}
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button matIconButton style="color: greenyellow;" (click)="editAction(element)">
          <mat-icon>thumb_up</mat-icon>
        </button>
        <button matIconButton style="color: rgb(250, 55, 55);" (click)="deleteAction(element)">
          <mat-icon>thumb_down</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns()"></tr>
    <tr mat-row *matRowDef="let row; columns: columns()"></tr>
  </table>
</div>
