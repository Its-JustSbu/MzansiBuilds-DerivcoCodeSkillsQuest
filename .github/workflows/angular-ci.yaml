name: Angular CI

on: 
  push:
    paths:
      - './frontend'
    branches: ["main"]
defaults:
  run:
    working-directory: ./frontend
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24  
        cache: "npm"

    - run: npm install
    - run: npm run build